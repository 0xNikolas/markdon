name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    # linux: nothing here is platform-dependent (vitest runs in a node
    # environment, no browser); e2e (WebKit) + rust below need macOS.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run test

  e2e:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps webkit
      # Builds the production bundle (vite build) and serves dist/ via the
      # config's webServer, then runs the WebKit smoke suite against it.
      - run: bunx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  rust:
    runs-on: macos-14
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  # Guards the stale-embedded-assets gotcha: assets are embedded by
  # generate_context!() at compile time, but only in a release (custom-protocol)
  # build. build.rs now folds ../dist into the crate fingerprint so a changed
  # frontend forces a re-embed; this job proves the shipped binary actually
  # carries the current dist/assets/index-<hash>.js.
  release-build:
    # Compile the real release binary on every shipped platform — Rust in
    # release profile with the frontend embedded via generate_context!() — so a
    # RELEASE-ONLY break (a compile error behind cfg(not(debug_assertions)), a
    # bad tauri.conf, a frontend build failure, or a macOS-ism that breaks the
    # Linux build) fails CI here instead of only at release time. The `rust`
    # job only compiles in the test profile, so this is the only gate that
    # exercises the shipped build. Both Mac targets share one OS, so building
    # the host arch is enough to prove macOS compiles.
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
          - platform: ubuntu-22.04
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux build dependencies (tauri v2)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.platform }}
      - run: bun install --frozen-lockfile
      # --no-bundle skips DMG/deb/AppImage packaging (not needed to prove the
      # binary compiles). The structural guard against STALE embedded assets is
      # build.rs's `cargo:rerun-if-changed=../dist` (verified locally).
      - name: Build the release binary (smoke test)
        run: |
          set -euo pipefail
          bunx tauri build --no-bundle
          test -f src-tauri/target/release/app
          echo "OK: release binary built on ${{ matrix.platform }}"
