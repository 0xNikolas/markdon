name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    # linux: nothing here is platform-dependent (vitest runs in a node
    # environment, no browser); e2e (WebKit) + rust below need macOS.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run test

  e2e:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps webkit
      # Builds the production bundle (vite build) and serves dist/ via the
      # config's webServer, then runs the WebKit smoke suite against it.
      - run: bunx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  rust:
    runs-on: macos-14
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  # Guards the stale-embedded-assets gotcha: assets are embedded by
  # generate_context!() at compile time, but only in a release (custom-protocol)
  # build. build.rs now folds ../dist into the crate fingerprint so a changed
  # frontend forces a re-embed; this job proves the shipped binary actually
  # carries the current dist/assets/index-<hash>.js.
  embed-assert:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: bun install --frozen-lockfile
      # Smoke-test that the release binary embeds the built frontend at all
      # (catches a wholly broken embed). The structural guard against STALE
      # embeds is build.rs's `cargo:rerun-if-changed=../dist`, which forces a
      # re-embed whenever dist changes — verified locally. A CI job that
      # re-proves that tracking would need two full release builds and was too
      # flaky in the runner (rust-cache mtime handling), so it is intentionally
      # a single-build smoke test, not an incremental-staleness guard.
      - name: Assert the release binary embeds the current dist assets
        run: |
          set -euo pipefail
          # --no-bundle skips DMG/app packaging + signing (not needed to inspect
          # the binary). beforeBuildCommand (bun run build) regenerates dist.
          bunx tauri build --no-bundle
          STEM=$(ls dist/assets | grep -oE 'index-[A-Za-z0-9_-]+\.js' | head -1)
          test -n "$STEM"
          BIN=src-tauri/target/release/app
          test -f "$BIN"
          # phf_map keys are AssetKey string literals in the binary's rodata
          # (plaintext regardless of brotli, which only compresses the values),
          # so a substring grep is reliable.
          grep -aqF "$STEM" "$BIN" || { echo "::error::embedded assets missing: $STEM not in $BIN"; exit 1; }
          echo "OK: $STEM present in the embedded bundle"
