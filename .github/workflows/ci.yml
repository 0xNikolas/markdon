name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    # linux: nothing here is platform-dependent (vitest runs in a node
    # environment, no browser); e2e (WebKit) + rust below need macOS.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run test

  e2e:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps webkit
      # Builds the production bundle (vite build) and serves dist/ via the
      # config's webServer, then runs the WebKit smoke suite against it.
      - run: bunx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  rust:
    runs-on: macos-14
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  # Guards the stale-embedded-assets gotcha: assets are embedded by
  # generate_context!() at compile time, but only in a release (custom-protocol)
  # build. build.rs now folds ../dist into the crate fingerprint so a changed
  # frontend forces a re-embed; this job proves the shipped binary actually
  # carries the current dist/assets/index-<hash>.js.
  embed-assert:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: bun install --frozen-lockfile
      # This job guards build.rs's `cargo:rerun-if-changed=../dist` against
      # regression. The bug it protects against is the STALE INCREMENTAL re-embed:
      # dist changes but an incremental cargo build reuses a cached binary that
      # still carries the old embedded assets. A single clean build always embeds
      # current assets, so it can't detect that — we must build TWICE, reusing
      # src-tauri/target and changing the frontend in between, so the second build
      # is genuinely incremental. If the rerun-if-changed line were removed, cargo
      # would skip the app crate on build 2 and the binary would keep build 1's
      # assets — which this assertion then catches.
      - name: Build, change the frontend, rebuild — assert the incremental re-embed
        run: |
          set -euo pipefail
          BIN=src-tauri/target/release/app
          stem() { ls dist/assets | grep -oE 'index-[A-Za-z0-9_-]+\.js' | head -1; }

          # Build 1 (from a cold target): embeds the current dist. --no-bundle
          # skips DMG/app packaging + signing (not needed to inspect the binary).
          bunx tauri build --no-bundle
          STEM_A=$(stem); test -n "$STEM_A"; test -f "$BIN"
          # phf_map keys are AssetKey string literals in the binary's rodata
          # (plaintext regardless of brotli, which only compresses the values),
          # so a substring grep is reliable.
          grep -aqF "$STEM_A" "$BIN"

          # A side-effecting console call with a unique literal survives
          # minification, so `bun run build` emits a new index-<hash>.js.
          printf "\nconsole.debug('ci-embed-probe-%s')\n" "$GITHUB_SHA" >> src/main.ts
          # Build 2 reuses src-tauri/target (no clean) — a true incremental build.
          bunx tauri build --no-bundle
          STEM_B=$(stem); test -n "$STEM_B"
          git checkout -- src/main.ts

          if [ "$STEM_A" = "$STEM_B" ]; then
            echo "::error::the frontend probe did not change the dist hash — this guard is inconclusive; fix the probe"
            exit 1
          fi
          if ! grep -aqF "$STEM_B" "$BIN"; then
            echo "::error::stale embed: dist changed to $STEM_B but the incremental binary still carries $STEM_A — build.rs rerun-if-changed has regressed"
            exit 1
          fi
          echo "OK: the incremental rebuild re-embedded $STEM_B"
